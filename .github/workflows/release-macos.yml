name: release-macos

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "tag override"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"; fi
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build (x86_64)
        run: cargo build --release --target x86_64-apple-darwin -p unterm -p unterm-cli -p unterm-mux -p strip-ansi-escapes
      - name: Build (aarch64)
        run: cargo build --release --target aarch64-apple-darwin -p unterm -p unterm-cli -p unterm-mux -p strip-ansi-escapes
      - name: Package universal .app + zip
        env:
          TAG_NAME: ${{ steps.tag.outputs.name }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
          MACOS_CERT: ${{ secrets.MACOS_CERT }}
          MACOS_CERT_PW: ${{ secrets.MACOS_CERT_PW }}
          MACOS_APPLEID: ${{ secrets.MACOS_APPLEID }}
          MACOS_APP_PW: ${{ secrets.MACOS_APP_PW }}
        run: ci/deploy.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: Unterm-macos-*.zip
      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Unterm-macos-*.zip
          fail_on_unmatched_files: false
