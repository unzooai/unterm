name: release-linux

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "tag override"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"; fi
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build deps
        # `get-deps` is the authoritative package list for the various Linux
        # distros — running it here keeps the workflow in sync with what the
        # README tells local devs to install. The hand-rolled list this used
        # to ship was missing libx11-xcb-dev / libxcb-ewmh-dev / libxcb-randr0-dev
        # and broke at the x11 crate's pkg-config check.
        run: |
          sudo apt-get update
          SUDO=sudo bash get-deps
      - name: Build
        run: cargo build --release -p unterm -p unterm-cli -p unterm-mux -p strip-ansi-escapes
      - name: Build .deb
        env:
          TAG_NAME: ${{ steps.tag.outputs.name }}
        run: ci/deploy.sh
      - name: Build AppImage
        env:
          TAG_NAME: ${{ steps.tag.outputs.name }}
        run: ci/appimage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            unterm-*.deb
            Unterm-*.AppImage
      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            unterm-*.deb
            Unterm-*.AppImage
          fail_on_unmatched_files: false
