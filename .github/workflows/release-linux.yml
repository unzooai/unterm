name: release-linux

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "tag override"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"; fi
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libfontconfig1-dev libssl-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb-keysyms1-dev libxcb-icccm4-dev libxcb-image0-dev libxcb-util-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev \
            fakeroot dpkg-dev curl
      - name: Build
        run: cargo build --release -p unterm -p unterm-cli -p unterm-mux -p strip-ansi-escapes
      - name: Build .deb
        env:
          TAG_NAME: ${{ steps.tag.outputs.name }}
        run: ci/deploy.sh
      - name: Build AppImage
        env:
          TAG_NAME: ${{ steps.tag.outputs.name }}
        run: ci/appimage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            unterm-*.deb
            Unterm-*.AppImage
      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            unterm-*.deb
            Unterm-*.AppImage
          fail_on_unmatched_files: false
