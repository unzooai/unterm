name: release-windows

on:
  push:
    tags: ["v[0-9]+.[0-9]+"]  # only minor (vX.Y) — patches accumulate on master
  workflow_dispatch:
    inputs:
      tag:
        description: "tag override"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    env:
      RUSTUP_WINDOWS_PATH_ADD_BIN: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"; fi
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p unterm -p unterm-cli -p unterm-mux -p strip-ansi-escapes
      - name: Stage zip
        shell: bash
        env:
          TAG_NAME: ${{ steps.tag.outputs.name }}
          OSTYPE: msys
        run: ci/deploy.sh
      - name: Install WiX (as a .NET tool, the official WiX 6 distribution)
        shell: pwsh
        run: |
          # WiX 6 ships as the `wix` .NET global tool, not a standalone .exe.
          # Install it into a per-repo path that build-msi.ps1 already looks at
          # (.\.tools\), so the script doesn't need to know where it lives on
          # the runner.
          New-Item -ItemType Directory -Force .\.tools | Out-Null
          dotnet tool install --tool-path .\.tools wix --version 6.0.1
      - name: Build MSI
        shell: pwsh
        run: |
          # Read the whole file as one string so the regex can span lines —
          # the WXS has <Package on its own line, then Name, Manufacturer,
          # Version="…" on subsequent lines, so the per-line Select-String
          # we used before couldn't see them together.
          # The case-sensitive `-cmatch` makes sure we don't accidentally
          # bind to the XML declaration's lowercase `version="1.0"`.
          $wxs = Get-Content -Raw installer\Unterm.wxs
          if ($wxs -cmatch '<Package[^>]*?\bVersion="([0-9.]+)"') {
            $ver = $Matches[1]
          } else {
            throw "couldn't extract Package Version from installer\Unterm.wxs"
          }
          Write-Host "Package Version = $ver"
          pwsh -File ci\build-msi.ps1 -Version $ver
      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            Unterm-windows-*.zip
            dist\Unterm-*.msi
      - name: GitHub Release
        # Publish on push-tag AND workflow_dispatch. The old `if:` guard checked
        # `startsWith(github.ref, 'refs/tags/')` — but workflow_dispatch has a
        # branch ref, not a tag ref, so it silently skipped the upload. Use
        # the resolved tag from the earlier step instead.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            Unterm-windows-*.zip
            dist\Unterm-*.msi
          fail_on_unmatched_files: false
