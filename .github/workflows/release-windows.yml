name: release-windows

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "tag override"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    env:
      RUSTUP_WINDOWS_PATH_ADD_BIN: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"; fi
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p unterm -p unterm-cli -p unterm-mux -p strip-ansi-escapes
      - name: Stage zip
        shell: bash
        env:
          TAG_NAME: ${{ steps.tag.outputs.name }}
          OSTYPE: msys
        run: ci/deploy.sh
      - name: Install WiX (as a .NET tool, the official WiX 6 distribution)
        shell: pwsh
        run: |
          # WiX 6 ships as the `wix` .NET global tool, not a standalone .exe.
          # Install it into a per-repo path that build-msi.ps1 already looks at
          # (.\.tools\), so the script doesn't need to know where it lives on
          # the runner.
          New-Item -ItemType Directory -Force .\.tools | Out-Null
          dotnet tool install --tool-path .\.tools wix --version 6.0.1
      - name: Build MSI
        shell: pwsh
        run: |
          # Anchor the regex on `Package … Version="…"` so we don't accidentally
          # match the XML declaration's lowercase `version="1.0"` on the first
          # line. Select-String is case-insensitive by default.
          $ver = (Select-String -Path installer\Unterm.wxs `
                                 -Pattern '<Package[^>]*\s+Version="([0-9.]+)"' `
                                 -CaseSensitive).Matches.Groups[1].Value
          if (-not $ver) { throw "couldn't extract Package Version from installer\Unterm.wxs" }
          pwsh -File ci\build-msi.ps1 -Version $ver
      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            Unterm-windows-*.zip
            dist\Unterm-*.msi
      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Unterm-windows-*.zip
            dist\Unterm-*.msi
          fail_on_unmatched_files: false
